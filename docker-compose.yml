version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ymd_postgres
    restart: always
    environment:
      POSTGRES_USER: ymd_user
      POSTGRES_PASSWORD: ymd_password
      POSTGRES_DB: ymd_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ymd_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data:
