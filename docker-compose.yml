version: '3.8'

services:
  api:
    build:
      context: ./ymd-server
    container_name: ymd_api
    restart: always
    environment:
      POSTGRES_SERVER: ${POSTGRES_SERVER}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      SQL_ECHO: ${SQL_ECHO:-false}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/openapi.json').read()"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./ymd-admin
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: ymd_web
    restart: always
    ports:
      - "8044:80"
    depends_on:
      - api

volumes:
  uploads:
